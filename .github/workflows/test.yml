name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  launch-token-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: launch.sh refreshes the proxy token on restore (GNU sed)
        run: sh test/launch-token-refresh.test.sh
      - name: Pi live catalog uses the selected egress mode
        run: sh test/pi-catalog-egress.test.sh
      - name: Bootstrap catalogs use the selected egress mode
        run: sh test/bootstrap-catalog-egress.test.sh
      - name: Primer render (host/identity self-heal)
        run: sh test/primer-render.test.sh
      - name: skills authoring contract (mirrors the downstream consumer)
        run: sh test/skills-contract.test.sh
      - name: shared skills installation contract
        run: sudo -E sh test/shared-skills-install.test.sh
      - name: drive-first skills installation contract
        run: sudo -E sh test/skills-drive-install.test.sh
