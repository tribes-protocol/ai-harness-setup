model = "__TRIBES_MODEL__"
model_provider = "tribes"
approval_policy = "never"
sandbox_mode = "danger-full-access"

# Notifications reach the browser terminal as an OSC 9 escape, which the zipbox
# terminal parses into a toast. Without a [tui] section Codex is silent in the
# sandbox. `notifications` MUST be the event list -- `notifications = true`
# parses without error but emits nothing (verified on a box).
[tui]
notifications = ["agent-turn-complete", "approval-requested"]
notification_method = "osc9"

[model_providers.tribes]
name = "Tribes LLM Proxy"
base_url = "__TRIBES_PROXY__"
env_key = "OPENAI_API_KEY"
wire_api = "responses"

[projects."/root/workspace"]
trust_level = "trusted"
